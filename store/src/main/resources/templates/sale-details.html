<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sale Details | Store Management</title>
    <!-- Fuentes elegantes: Playfair para títulos, Jost para lectura -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:        #F5F0E8; /* Crema: Fondo de página */
            --dark:      #1A1A2E; /* Azul noche: Headers y botones */
            --gold:      #E8B86D; /* Dorado: Acento principal */
            --gold-hover:#C99A50;
            --brown:     #6B4C2A; /* Marrón: Texto secundario y acentos */
            --text:      #2D2D2D; /* Gris oscuro: Texto principal */
            --white:     #FFFFFF;
            --border:    #E2D9CE;
            --radius:    12px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Jost', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 10% 10%, rgba(232,184,109,0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(26,26,46,0.05) 0%, transparent 40%);
            padding: 50px 20px;
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: var(--dark);
            font-size: 32px;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        /* Área de acciones superiores */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        /* Botones */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-family: 'Jost', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-new {
            background-color: var(--dark);
            color: var(--gold);
            border: 1px solid var(--gold);
            box-shadow: 0 4px 15px rgba(26, 26, 46, 0.15);
        }

        .btn-new:hover {
            background-color: var(--gold);
            color: var(--dark);
            transform: translateY(-2px);
        }

        /* Botones de la tabla */
        .btn-edit {
            background: transparent;
            color: var(--brown);
            border: 1px solid var(--brown);
            padding: 6px 14px;
            font-size: 11px;
        }

        .btn-edit:hover {
            background: var(--brown);
            color: var(--white);
        }

        .btn-delete {
            background: transparent;
            color: #B84040;
            border: 1px solid rgba(184, 64, 64, 0.3);
            padding: 6px 14px;
            font-size: 11px;
            margin-left: 4px;
        }

        .btn-delete:hover {
            background: #B84040;
            color: var(--white);
            border-color: #B84040;
        }

        /* Estilo de la Tabla */
        .table-container {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(26, 26, 46, 0.06);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        th {
            background-color: var(--dark);
            color: var(--gold);
            padding: 18px 15px;
            text-align: center;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        td {
            padding: 16px 15px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Zebra and Hover */
        tr:nth-child(even) {
            background-color: #FCFAF7;
        }

        tr:hover td {
            background-color: #F2EDE4;
        }

        /* Badge para cantidades o subtotales */
        .price-tag {
            font-weight: 600;
            color: var(--brown);
        }

        .footer-nav {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        .btn-back {
            background: transparent;
            color: var(--muted);
            font-weight: 400;
            text-transform: none;
            font-size: 14px;
        }

        .btn-back:hover {
            color: var(--dark);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sale Details</h1>

    <div class="top-bar">
        <a th:href="@{/sale-details/new}" class="btn btn-new">
            <span>+</span> New Detail
        </a>
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Sale ID</th>
                <th>Qty</th>
                <th>Unit Price</th>
                <th>Subtotal</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="detail : ${details}">
                <td th:text="${detail.saleDetailId}">1</td>

                <td style="font-weight: 500;" th:text="${detail.product != null ? detail.product.productName : 'N/A'}">Product Name</td>

                <td th:text="${detail.sale != null ? detail.sale.saleId : 'N/A'}">#1001</td>

                <td th:text="${detail.quantity}">0</td>

                <td class="price-tag" th:text="${detail.unitPrice}">$0.00</td>

                <td class="price-tag" style="color: var(--dark);" th:text="${detail.subtotal}">$0.00</td>

                <td>
                    <a th:href="@{/sale-details/edit/{id}(id=${detail.saleDetailId})}" class="btn btn-edit">Edit</a>
                    <a th:href="@{/sale-details/delete/{id}(id=${detail.saleDetailId})}"
                       class="btn btn-delete"
                       onclick="return confirm('Are you sure you want to delete this detail?')">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="footer-nav">
        <a th:href="@{/home}" class="btn btn-back">← Back to Dashboard</a>
    </div>
</div>

</body>
</html>
