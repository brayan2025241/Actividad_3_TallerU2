<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Form | Store Management</title>
    <!-- Fuentes premium -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:        #F5F0E8; /* Crema */
            --card:      #FFFFFF;
            --dark:      #1A1A2E; /* Azul noche */
            --gold:      #E8B86D; /* Dorado */
            --brown:     #6B4C2A; /* Marrón cálido */
            --text:      #2D2D2D; /* Texto principal */
            --border:    #E2D9CE;
            --radius:    12px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Jost', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 10% 10%, rgba(232,184,109,0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(26,26,46,0.06) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            padding: 45px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(26, 26, 46, 0.15);
            border: 1px solid var(--border);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: var(--dark);
            font-size: 28px;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--brown);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            color: var(--text);
            background: #FAFAFA;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--gold);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(232, 184, 109, 0.15);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 35px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: var(--radius);
            font-family: 'Jost', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-guardar {
            background-color: var(--dark);
            color: var(--gold);
            border: 1px solid var(--gold);
        }

        .btn-guardar:hover {
            background-color: var(--gold);
            color: var(--dark);
            transform: translateY(-2px);
        }

        .btn-cancelar {
            background-color: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-cancelar:hover {
            background-color: #FDF0F0;
            color: #B84040;
            border-color: #B84040;
        }
    </style>
</head>
<body>

<div class="container">

    <h1 th:text="${editMode} ? 'Editar Usuario' : 'Nuevo Usuario'">Nuevo Usuario</h1>

    <form th:action="${editMode} ? @{/users/update} : @{/users/save}" th:object="${user}" method="post">

        <input type="hidden" th:field="*{userId}"/>

        <div class="form-group">
            <label>Username</label>
            <input type="text" th:field="*{username}" placeholder="Nombre de usuario" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password_user}" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" th:field="*{email}" placeholder="ejemplo@tienda.com" required>
        </div>

        <div class="form-group">
            <label>User Role</label>
            <input type="text" th:field="*{role_user}" placeholder="Admin / Staff">
        </div>

        <div class="form-group">
            <label>Account Status</label>
            <input type="number" th:field="*{status_user}" placeholder="1 (Activo) / 0 (Inactivo)">
        </div>

        <div class="button-group">
            <button type="submit" class="btn btn-guardar">Guardar Usuario</button>
            <a th:href="@{/users}" class="btn btn-cancelar">Cancelar</a>
        </div>

    </form>

</div>

</body>
</html>
