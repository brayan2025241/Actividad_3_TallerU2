<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:        #F5F0E8;
            --card:      #FFFFFF;
            --dark:      #1A1A2E;
            --gold:      #E8B86D;
            --gold-dark: #C99A50;
            --brown:     #6B4C2A;
            --text:      #2D2D2D;
            --muted:     #8A7F74;
            --border:    #E2D9CE;
            --error:     #B84040;
            --radius:    10px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Jost', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 15% 20%, rgba(232,184,109,0.10) 0%, transparent 45%),
                radial-gradient(circle at 85% 80%, rgba(26,26,46,0.06) 0%, transparent 45%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 460px;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 16px 48px rgba(26,26,46,0.12);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        /* Header */
        .form-header {
            background: var(--dark);
            padding: 28px 36px 24px;
            position: relative;
            overflow: hidden;
        }

        .form-header::after {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 120px; height: 120px;
            border-radius: 50%;
            background: rgba(232,184,109,0.10);
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: rgba(232,184,109,0.15);
            border: 1px solid rgba(232,184,109,0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .header-icon svg {
            width: 18px; height: 18px;
            stroke: var(--gold);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .form-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: #FFFFFF;
        }

        .form-header p {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            font-weight: 300;
            margin-top: 3px;
        }

        .gold-bar {
            width: 32px;
            height: 2px;
            background: var(--gold);
            border-radius: 2px;
            margin-top: 16px;
            opacity: 0.7;
        }

        /* Form body */
        .form-body {
            padding: 32px 36px 36px;
        }

        /* Two-column row */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--brown);
            margin-bottom: 7px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            color: var(--text);
            background: #FDFAF6;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(232,184,109,0.15);
        }

        .field-hint {
            font-size: 11px;
            color: var(--muted);
            margin-top: 5px;
            font-weight: 300;
        }

        .error-msg {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--error);
            font-size: 12px;
            margin-top: 5px;
        }

        .error-msg::before {
            content: '!';
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--error);
            color: white;
            font-size: 9px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* Actions */
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 28px;
        }

        .btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 11px 20px;
            border-radius: var(--radius);
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: opacity .2s, transform .1s;
            letter-spacing: 0.3px;
        }

        .btn:hover  { opacity: 0.87; transform: translateY(-1px); }
        .btn:active { transform: scale(0.98); }

        .btn-save {
            background: var(--dark);
            color: #fff;
            box-shadow: 0 4px 14px rgba(26,26,46,0.18);
        }

        .btn-cancel {
            background: transparent;
            color: var(--brown);
            border: 1.5px solid var(--border);
        }

        .btn-cancel:hover { background: rgba(107,76,42,0.06); }
    </style>
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="form-header">
        <div class="header-top">
            <div class="header-icon">
                <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            </div>
            <div>
                <h2>Product Form</h2>
                <p>Fill in the product details below</p>
            </div>
        </div>
        <div class="gold-bar"></div>
    </div>

    <!-- Form body -->
    <div class="form-body">
        <form th:action="@{/products/save}" th:object="${product}" method="post">

            <input type="hidden" th:field="*{productId}"/>

            <!-- Product name — full width -->
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" th:field="*{productName}" placeholder="e.g. Wireless Mouse">
                <div class="error-msg" th:errors="*{productName}"></div>
            </div>

            <!-- Price & Stock — two columns -->
            <div class="form-row">
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" step="0.01" th:field="*{price}" placeholder="0.00">
                    <div class="error-msg" th:errors="*{price}"></div>
                </div>

                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" th:field="*{stock}" placeholder="0">
                    <div class="error-msg" th:errors="*{stock}"></div>
                </div>
            </div>

            <!-- Status -->
            <div class="form-group">
                <label>Status</label>
                <input type="number" th:field="*{statusProduct}" placeholder="1 = Active, 0 = Inactive" min="0" max="1">
                <p class="field-hint">Enter 1 for Active or 0 for Inactive</p>
                <div class="error-msg" th:errors="*{statusProduct}"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-save">Save</button>
                <a th:href="@{/products}" class="btn btn-cancel">Cancel</a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
