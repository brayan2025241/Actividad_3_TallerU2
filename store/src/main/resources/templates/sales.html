<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sales List | Store Management</title>
    <!-- Fuentes elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:        #F5F0E8; /* Crema */
            --dark:      #1A1A2E; /* Azul noche */
            --gold:      #E8B86D; /* Dorado principal */
            --gold-hover:#C99A50;
            --text:      #2D2D2D; /* Texto principal */
            --brown:     #6B4C2A; /* Marrón cálido */
            --white:     #FFFFFF;
            --border:    #E2D9CE;
            --radius:    12px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Jost', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 5% 5%, rgba(232,184,109,0.08) 0%, transparent 30%),
                radial-gradient(circle at 95% 95%, rgba(26,26,46,0.05) 0%, transparent 30%);
            margin: 0;
            padding: 50px 30px;
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: var(--dark);
            font-size: 36px;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        /* Barra superior de acciones */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        /* Botones generales */
        .btn {
            display: inline-flex;
            align-items: center;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-family: 'Jost', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
        }

        .btn-new {
            background-color: var(--dark);
            color: var(--gold);
            border: 1px solid var(--gold);
            box-shadow: 0 4px 15px rgba(26, 26, 46, 0.1);
        }

        .btn-new:hover {
            background-color: var(--gold);
            color: var(--dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 184, 109, 0.2);
        }

        /* Botones de acción en tabla */
        .btn-edit {
            background: transparent;
            color: var(--brown);
            border: 1px solid var(--brown);
            padding: 6px 14px;
            font-size: 11px;
            margin-right: 5px;
        }

        .btn-edit:hover {
            background: var(--brown);
            color: var(--white);
        }

        .btn-delete {
            background: transparent;
            color: #B84040;
            border: 1px solid rgba(184, 64, 64, 0.3);
            padding: 6px 14px;
            font-size: 11px;
        }

        .btn-delete:hover {
            background: #B84040;
            color: var(--white);
            border-color: #B84040;
        }

        /* Diseño de la tabla */
        .table-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(26, 26, 46, 0.08);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: var(--dark);
            color: var(--gold);
            padding: 20px 15px;
            text-align: center;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1.2px;
        }

        td {
            padding: 18px 15px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            color: var(--text);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Zebra sutil y Hover */
        tr:nth-child(even) {
            background-color: #FCFAF7;
        }

        tr:hover td {
            background-color: #F2EDE4;
            transition: background 0.2s ease;
        }

        /* Estilos específicos de datos */
        .total-cell {
            font-weight: 600;
            color: var(--dark);
        }

        .status-badge {
            background: #E2D9CE;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--brown);
        }

        .footer-nav {
            margin-top: 40px;
            text-align: center;
        }

        .btn-home {
            background: transparent;
            color: var(--brown);
            border: 1px solid transparent;
            text-transform: none;
            font-size: 15px;
            font-weight: 400;
        }

        .btn-home:hover {
            color: var(--dark);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sales List</h1>

    <div class="action-bar">
        <a th:href="@{/sales/new}" class="btn btn-new">
            <span style="margin-right: 8px;">+</span> New Sale
        </a>
    </div>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Total Amount</th>
                <th>Status</th>
                <th>Customer</th>
                <th>Sales Rep</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="sale : ${sales}">
                <td th:text="${sale.saleId}">#1</td>
                <td th:text="${sale.saleDate}">2023-10-27</td>
                <td class="total-cell" th:text="'$' + ${sale.total}">$0.00</td>
                <td>
                    <span class="status-badge" th:text="${sale.statusSale}">1</span>
                </td>

                <td th:text="${sale.customer != null ? sale.customer.firstName + ' ' + sale.customer.lastName : 'N/A'}">
                    Customer Name
                </td>

                <td th:text="${sale.user != null ? sale.user.username : 'N/A'}">
                    User
                </td>

                <td>
                    <a th:href="@{/sales/edit/{id}(id=${sale.saleId})}" class="btn btn-edit">Edit</a>
                    <a th:href="@{/sales/delete/{id}(id=${sale.saleId})}"
                       class="btn btn-delete"
                       onclick="return confirm('Delete sale?')">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="footer-nav">
        <a th:href="@{/home}" class="btn btn-home">← Volver al Dashboard</a>
    </div>
</div>

</body>
</html>
